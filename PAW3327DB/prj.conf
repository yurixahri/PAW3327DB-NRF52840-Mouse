# Enable logging
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_STDOUT_CONSOLE=n
# CONFIG_PRINTK=y
# CONFIG_LOG_DEFAULT_LEVEL=3

# Enable GPIO and SPI
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_SPI_ASYNC=y

# USB support
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_HID=n
CONFIG_USB_NRFX=n
# CONFIG_USB_DEVICE_PRODUCT="Zephyr HID mouse"
# CONFIG_USB_DEVICE_PID=0x0007
# CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y

# CONFIG_USB_DRIVER_LOG_LEVEL_ERR=y
# CONFIG_USB_DEVICE_LOG_LEVEL_ERR=y

CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y

CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_ESB=y
CONFIG_ESB_FAST_SWITCHING=y
CONFIG_DK_LIBRARY=y
CONFIG_CLOCK_CONTROL=y
CONFIG_NRFX_CLOCK=y

# Settings
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# Power optimization: enable tickless idle and reduce kernel tick frequency
CONFIG_TICKLESS_KERNEL=y
# Lower tick rate to reduce periodic wakeups (tune as needed; 25/50/100 are common choices)
# CONFIG_SYS_CLOCK_TICKS_PER_SEC=5000
CONFIG_POWEROFF=y
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_PM=y
